version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jane_automation}
      POSTGRES_USER: ${POSTGRES_USER:-jane_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jane_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Expose locally for development/debugging; remove in production behind Caddy
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jane_user} -d ${POSTGRES_DB:-jane_automation}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override DB host to use Docker service name
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-jane_user}:${POSTGRES_PASSWORD:-jane_pass}@db:5432/${POSTGRES_DB:-jane_automation}
    expose:
      - "8000"
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
